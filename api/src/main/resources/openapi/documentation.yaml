      summary: "Atualizar veículo"
      description: "Atualiza os dados de um veículo existente"
      operationId: updateVehicle
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID do veículo"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleRequestDTO"
      responses:
        "200":
          description: "Veículo atualizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleResponseDTO"
        "400":
          description: "ID inválido"
          content:
