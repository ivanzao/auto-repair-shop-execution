      responses:
        "200":
          description: "Lista de atendentes"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendantResponseDTO"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Acesso negado (requer ADMIN)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Attendant
      summary: "Cadastrar novo atendente"
      description: "Cria um novo atendente no sistema (requer role ADMIN)"
      operationId: createAttendant
      security:
