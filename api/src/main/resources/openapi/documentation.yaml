        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Acesso negado (requer ADMIN)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Atendente não encontrado"

    delete:
      tags:
        - Attendant
      summary: "Remover atendente"
      description: "Remove um atendente do sistema (requer role ADMIN)"
      operationId: deleteAttendant
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID do atendente"
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: "Atendente removido com sucesso"
        "400":
          description: "ID inválido"
          content:
            application/json:
              schema:
                type: string
              examples:
                invalid:
                  value: "Invalid ID format"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Acesso negado (requer ADMIN)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Atendente não encontrado"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Autenticação via JWT Bearer Token.

        O token é emitido pelo Lambda Authorizer no API Gateway (repositório separado).
        O app decodifica as claims (`sub` → userId, `role`) sem re-validar a assinatura.

        **Formato do header:**
        ```
        Authorization: Bearer <jwt>
        ```

        **Roles disponíveis:**
        - `ADMIN`: Acesso total a todos os endpoints protegidos (incluindo `/attendants`)
        - `ATTENDANT`: Acesso a endpoints de ordens, clientes, veículos, serviços e insumos

  schemas:
    # ==================== ORDER DTOs ====================
    CreateOrderRequestDTO:
      type: object
      description: "Dados para criar uma nova ordem de serviço. O attendantId é extraído automaticamente do JWT pelo servidor."
      properties:
        customerId:
          type: string
          format: uuid
          description: "ID do cliente"
        vehicleId:
          type: string
          format: uuid
          description: "ID do veículo"
        description:
          type: string
          description: "Descrição do problema/serviço solicitado"
          example: "Veículo com barulho no motor ao acelerar"
        technician:
          type: string
          nullable: true
          description: "Nome do técnico responsável (opcional)"
        servicesIds:
          type: array
          items:
            type: string
            format: uuid
          description: "IDs dos serviços a incluir na ordem"
        extraSuppliesRequests:
          type: array
          items:
            $ref: "#/components/schemas/SupplyRequirementDTO"
          description: "Insumos extras necessários além dos serviços (opcional)"
          default: []
      required:
        - customerId
        - vehicleId
        - description
        - servicesIds

    OrderResponseDTO:
      type: object
      description: "Resposta completa de uma ordem de serviço"
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/OrderStatus"
        customer:
          $ref: "#/components/schemas/Customer"
        vehicle:
          $ref: "#/components/schemas/Vehicle"
        attendantId:
          type: string
          format: uuid
          description: "ID do atendente que criou a ordem"
        description:
          type: string
        services:
          type: array
          items:
            $ref: "#/components/schemas/Service"
        technician:
          type: string
          nullable: true
      required:
        - id
        - createdAt
        - status
        - customer
        - vehicle
        - attendantId
        - description
        - services

    OrderStatusResponseDTO:
      type: object
      description: "Status resumido da ordem (para consulta pública)"
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/OrderStatus"
        modifiedAt:
          type: string
          format: date-time
          description: "Última atualização da ordem"
      required:
        - id
        - status
        - modifiedAt

    OrderMetricsResponseDTO:
      type: object
      description: "Métricas consolidadas das ordens de serviço"
      properties:
        totalCompleted:
          type: integer
          format: int64
          description: "Total de ordens completadas"
          example: 150
        averageExecutionTimeSeconds:
          type: integer
          format: int64
          nullable: true
          description: "Tempo médio de execução em segundos (null se não houver ordens completadas)"
          example: 86400
      required:
        - totalCompleted

    PageOrderResponseDTO:
      type: object
      description: "Resposta paginada de ordens de serviço"
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/OrderResponseDTO"
          description: "Lista de ordens na página atual"
        page:
          type: integer
          format: int32
          description: "Número da página atual"
          example: 1
        size:
          type: integer
          format: int32
          description: "Quantidade de itens na página"
          example: 10
      required:
        - content
        - page
        - size

    OrderScheduleVehicleRequestDTO:
      type: object
      description: "Dados para agendamento de entrega/devolução do veículo"
      properties:
        dateTime:
          type: string
          format: date-time
          description: "Data e hora do agendamento (formato ISO 8601 UTC)"
          example: "2025-01-20T10:00:00Z"
      required:
        - dateTime

    OrderStatus:
      type: string
      description: "Status possíveis de uma ordem de serviço"
      enum:
        - RECEIVED
        - IN_DIAGNOSIS
        - WAITING_APPROVAL
        - APPROVED
        - REJECTED
        - IN_PROGRESS
        - CANCELED
        - COMPLETED
        - DELIVERED

    SupplyRequirementDTO:
      type: object
      description: "Insumo necessário para um serviço"
      properties:
        supplyId:
          type: string
          format: uuid
        quantity:
          type: integer
          format: int32
          minimum: 1
      required:
        - supplyId
        - quantity

    # ==================== CUSTOMER DTOs ====================
    CreateCustomerRequestDTO:
      type: object
      description: "Dados para cadastrar um cliente"
      properties:
        name:
          type: string
          description: "Nome completo do cliente"
          example: "Maria da Silva"
        document:
          type: string
          description: "CPF ou CNPJ do cliente"
          example: "123.456.789-00"
        email:
          type: string
          format: email
          description: "Email do cliente"
          example: "maria@email.com"
        contact:
          type: string
          description: "Telefone de contato"
          example: "(11) 99999-9999"
      required:
        - name
        - document
        - email
        - contact

    CustomerResponseDTO:
      type: object
      description: "Dados do cliente"
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        document:
          type: string
        email:
          type: string
        contact:
          type: string
      required:
        - id
        - name
        - document
        - email
        - contact

    # ==================== VEHICLE DTOs ====================
    CreateVehicleRequestDTO:
      type: object
      description: "Dados para cadastrar um veículo"
      properties:
        clientId:
          type: string
          format: uuid
          description: "ID do cliente proprietário"
        plate:
          type: string
          description: "Placa do veículo"
          example: "ABC-1234"
        brand:
          type: string
          description: "Marca do veículo"
          example: "Toyota"
        model:
          type: string
          description: "Modelo do veículo"
          example: "Corolla"
        year:
          type: integer
          format: int32
          description: "Ano do veículo"
          example: 2022
      required:
        - clientId
        - plate
        - brand
        - model
        - year

    VehicleResponseDTO:
      type: object
      description: "Dados do veículo"
      properties:
        id:
          type: string
          format: uuid
        plate:
          type: string
        brand:
          type: string
        model:
          type: string
        year:
          type: integer
          format: int32
        clientId:
          type: string
          format: uuid
      required:
        - id
        - plate
        - brand
        - model
        - year
        - clientId

    # ==================== SUPPLY DTOs ====================
    CreateServiceRequestDTO:
      type: object
      description: "Dados para cadastrar um serviço"
      properties:
        name:
          type: string
          description: "Nome do serviço"
          example: "Troca de óleo"
        description:
          type: string
          nullable: true
          description: "Descrição detalhada do serviço"
          example: "Serviço de troca de óleo do motor incluindo filtro"
        price:
          type: number
          format: decimal
          description: "Preço do serviço"
          example: 150.00
        requiredSupplies:
          type: array
          items:
            $ref: "#/components/schemas/SupplyRequirementDTO"
          description: "Insumos necessários para realizar o serviço"
      required:
        - name
        - price

    ServiceResponseDTO:
      type: object
      description: "Dados do serviço"
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          format: decimal
        requiredSupplies:
          type: array
          items:
            $ref: "#/components/schemas/SupplyRequirementDTO"
      required:
        - id
        - name
        - price
        - requiredSupplies

    # ==================== ATTENDANT DTOs ====================
    CreateAttendantRequestDTO:
      type: object
      description: "Dados para cadastrar um atendente"
      properties:
        name:
          type: string
          description: "Nome completo"
          example: "Carlos Atendente"
        document:
          type: string
          description: "CPF do atendente"
          example: "111.222.333-44"
        email:
          type: string
          format: email
          description: "Email do atendente"
          example: "carlos@autorepair.com"
        contact:
          type: string
          description: "Telefone de contato"
          example: "(11) 98888-7777"
      required:
        - name
        - document
        - email
        - contact

    UpdateAttendantRequestDTO:
      type: object
      description: "Dados para atualizar um atendente"
      properties:
        name:
          type: string
          description: "Nome completo"
          example: "Carlos Atendente Atualizado"
        document:
          type: string
          description: "CPF do atendente"
          example: "111.222.333-44"
        email:
          type: string
          format: email
          description: "Email do atendente"
          example: "carlos.novo@autorepair.com"
        contact:
          type: string
          description: "Telefone de contato"
          example: "(11) 98888-7777"
      required:
        - name
        - document
        - email
        - contact

    AttendantResponseDTO:
      type: object
      description: "Dados do atendente"
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        document:
          type: string
        email:
          type: string
        contact:
          type: string
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - document
        - email
        - contact
        - createdAt
        - modifiedAt

    # ==================== DOMAIN ENTITIES ====================
    Customer:
      type: object
      description: "Entidade Cliente completa"
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int32
          default: 0
        name:
          type: string
        document:
          type: string
        email:
          type: string
        contact:
          type: string
      required:
        - id
        - createdAt
        - modifiedAt
        - version
        - name
        - document
        - email
        - contact

    Vehicle:
      type: object
      description: "Entidade Veículo completa"
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int32
          default: 0
        clientId:
          type: string
          format: uuid
        plate:
          type: string
        brand:
          type: string
        model:
          type: string
        year:
          type: integer
          format: int32
      required:
        - id
        - createdAt
        - modifiedAt
        - version
        - clientId
        - plate
        - brand
        - model
        - year

    Service:
      type: object
      description: "Serviço de uma ordem"
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int32
          default: 0
        requiredSupplies:
          type: array
          items:
            $ref: "#/components/schemas/SupplyRequirement"
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          format: decimal
      required:
        - id
        - createdAt
        - modifiedAt
        - version
        - requiredSupplies
        - name
        - price

    SupplyRequirement:
      type: object
      description: "Quantidade de insumo requerido"
      properties:
        supplyId:
          type: string
          format: uuid
        quantity:
          type: integer
          format: int32
      required:
        - supplyId
        - quantity

    # ==================== ERROR RESPONSE ====================
    ErrorResponse:
      type: object
      description: "Resposta de erro padrão"
      properties:
        message:
          type: string
          description: "Mensagem de erro"
          example: "Token is not valid or has expired"
        code:
          type: string
          description: "Código do erro"
          example: "UNAUTHORIZED"
