openapi: "3.1.0"
info:
  title: "Auto Repair Shop API"
  description: "API para gerenciamento de oficina mecânica - FIAP SOAT"
  version: "1.0.0"

servers:
  - url: "http://localhost:8080/v1"
    description: "Local development server"

tags:
  - name: Health
    description: "Health check da aplicação"
  - name: Order
    description: "Gerenciamento de ordens de serviço"
  - name: Customer
    description: "Gerenciamento de clientes"
  - name: Vehicle
    description: "Gerenciamento de veículos"
  - name: Service
    description: "Gerenciamento de serviços oferecidos pela oficina"
  - name: Attendant
    description: "Gerenciamento de atendentes da oficina (requer role ADMIN)"

paths:
  # ==================== ORDERS ====================
  /orders:
    get:
      tags:
        - Order
      summary: "Listar ordens de serviço"
      description: "Retorna a lista paginada de todas as ordens de serviço"
      operationId: getAllOrders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: "Número da página (padrão: 1)"
          schema:
            type: integer
            format: int32
            default: 1
            minimum: 1
      responses:
        "200":
          description: "Lista de ordens"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageOrderResponseDTO"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Order
      summary: "Criar nova ordem de serviço"
      description: "Cria uma nova ordem de serviço para um cliente e veículo"
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequestDTO"
      responses:
        "201":
          description: "Ordem criada com sucesso"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponseDTO"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      tags:
        - Order
      summary: "Buscar ordem por ID"
      description: "Retorna os detalhes completos de uma ordem de serviço"
      operationId: getOrderById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID da ordem de serviço"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Ordem encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponseDTO"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Ordem não encontrada"

  /orders/{id}/status:
    get:
      tags:
        - Order
      summary: "Consultar status da ordem"
      description: "Endpoint público para cliente consultar status da ordem"
      operationId: getOrderStatus
      parameters:
        - name: id
          in: path
          required: true
          description: "ID da ordem de serviço"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Status encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatusResponseDTO"
        "400":
          description: "ID inválido"
          content:
            application/json:
              schema:
                type: string
              examples:
                invalid:
                  value: "Invalid Order ID format"
        "404":
          description: "Ordem não encontrada"

  /orders/metrics:
    get:
      tags:
        - Order
      summary: "Obter métricas de ordens"
      description: "Retorna métricas consolidadas das ordens de serviço (total completadas e tempo médio de execução)"
      operationId: getOrderMetrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Métricas obtidas com sucesso"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderMetricsResponseDTO"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/schedule-delivery:
    post:
      tags:
        - Order
      summary: "Agendar entrega do veículo"
      description: "Agenda a data/hora de entrega do veículo na oficina"
      operationId: scheduleDelivery
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID da ordem de serviço"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderScheduleVehicleRequestDTO"
      responses:
        "200":
          description: "Entrega agendada com sucesso"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/schedule-return:
    post:
      tags:
        - Order
      summary: "Agendar devolução do veículo"
      description: "Agenda a data/hora de devolução do veículo ao cliente"
      operationId: scheduleReturn
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID da ordem de serviço"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderScheduleVehicleRequestDTO"
      responses:
        "200":
          description: "Devolução agendada com sucesso"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/deliver:
    post:
      tags:
        - Order
      summary: "Entregar veículo ao cliente"
      description: "Marca a ordem de serviço como entregue ao cliente"
      operationId: deliverOrder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID da ordem de serviço"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Ordem marcada como entregue"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponseDTO"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Ordem não encontrada"

  # ==================== CUSTOMERS ====================
  /customers:
