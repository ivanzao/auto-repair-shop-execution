          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/{id}:
    get:
      tags:
        - Customer
      summary: "Buscar cliente por ID"
      description: "Retorna os dados de um cliente específico"
      operationId: getCustomerById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID do cliente"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Cliente encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponseDTO"
        "400":
          description: "ID inválido"
          content:
            application/json:
              schema:
                type: string
              examples:
                invalid:
                  value: "Invalid ID format"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Cliente não encontrado"

    put:
      tags:
        - Customer
      summary: "Atualizar cliente"
      description: "Atualiza os dados de um cliente existente"
      operationId: updateCustomer
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID do cliente"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequestDTO"
      responses:
        "200":
          description: "Cliente atualizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponseDTO"
        "400":
          description: "ID inválido"
          content:
            application/json:
              schema:
                type: string
              examples:
                invalid:
                  value: "Invalid ID format"
        "401":
          description: "Não autorizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Cliente não encontrado"

    delete:
      tags:
        - Customer
      summary: "Remover cliente"
      description: "Remove um cliente do sistema"
      operationId: deleteCustomer
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID do cliente"
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: "Cliente removido com sucesso"
        "400":
          description: "ID inválido"
          content:
            application/json:
