openapi: "3.1.0"
info:
  title: "Auto Repair Shop Execution API"
  description: |
    API do execution service - FIAP SOAT.

    Responsável pela fila de execução das ordens de serviço, pelo avanço de
    status durante diagnóstico e reparo, e pelo estoque de peças. Participa da
    saga coreografada: reserva peças ao receber `OrderCreated`, libera a reserva
    nas compensações (`QuoteRejected`, `PaymentFailed`) e comunica o fim da
    execução ao order.

    Persistência em DynamoDB single-table.
  version: "1.0.0"

servers:
  - url: "http://localhost:8080"
    description: "Local development server"

tags:
  - name: Health
    description: "Health check da aplicação"
  - name: Execution
    description: "Fila de execução e ciclo de vida da execução (requer role MECHANIC)"
  - name: Supply
    description: "Gerenciamento do estoque de peças (requer role ADMIN)"

paths:
  /health:
    get:
      tags:
        - Health
      summary: "Health check"
      description: "Verifica se a aplicação está no ar. Usado pelas probes do Kubernetes."
      responses:
        "200":
          description: "Aplicação saudável"
          content:
            text/plain:
              schema:
                type: string
                examples:
                  - "OK"

  /metrics:
    get:
      tags:
        - Health
      summary: "Métricas Prometheus"
      description: "Métricas no formato Prometheus, coletadas pelo ServiceMonitor."
      responses:
        "200":
          description: "Métricas expostas"
          content:
            text/plain:
              schema:
                type: string

  /v1/executions:
    get:
      tags:
        - Execution
      summary: "Lista execuções por status"
      description: |
        Retorna as execuções em um determinado status. É a fila de trabalho do
        mecânico: sem o parâmetro `status`, retorna as execuções em `QUEUED`.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: "Status a filtrar. Default: `QUEUED`."
          schema:
            $ref: "#/components/schemas/ExecutionStatus"
      responses:
        "200":
          description: "Lista de execuções no status informado"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionResponse"
        "400":
          description: "Status informado não é um valor válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: "Token ausente ou inválido"
        "403":
          description: "Token válido, mas sem a role MECHANIC"

  /v1/executions/{orderId}:
    get:
      tags:
        - Execution
      summary: "Consulta uma execução"
      description: "Retorna a execução da ordem de serviço informada."
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          description: "Identificador da ordem de serviço"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Execução encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResponse"
        "400":
          description: "`orderId` não é um UUID válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: "Token ausente ou inválido"
        "403":
          description: "Token válido, mas sem a role MECHANIC"
        "422":
          description: "Nenhuma execução para a ordem informada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/executions/{orderId}/finish-diagnosis:
    post:
      tags:
        - Execution
      summary: "Conclui o diagnóstico"
      description: |
        Marca o diagnóstico como concluído e move a execução para `DIAGNOSED`.
        Publica `DiagnoseFinished` na saga.
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Diagnóstico concluído"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResponse"
        "400":
          description: "`orderId` não é um UUID válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: "Token ausente ou inválido"
        "403":
          description: "Token válido, mas sem a role MECHANIC"
        "422":
          description: "Execução em estado que não permite concluir diagnóstico"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/executions/{orderId}/finish:
    post:
      tags:
        - Execution
      summary: "Conclui a execução"
      description: |
        Marca a execução como concluída e move para `COMPLETED`. Publica
        `ExecutionFinished`, que leva o order a fechar a OS.
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Execução concluída"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResponse"
        "400":
          description: "`orderId` não é um UUID válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: "Token ausente ou inválido"
        "403":
          description: "Token válido, mas sem a role MECHANIC"
        "422":
          description: "Execução em estado que não permite conclusão"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/executions/{orderId}/fail:
    post:
      tags:
        - Execution
      summary: "Registra falha na execução"
      description: |
        Marca a execução como falha, com o motivo informado, e move para `FAILED`.
        Publica `ExecutionFailed`, que dispara a compensação na saga.
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: "Motivo da falha"
                  examples:
                    - "Peça chegou com defeito de fábrica"
              required:
                - reason
      responses:
        "200":
          description: "Falha registrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResponse"
        "400":
          description: "`orderId` inválido ou corpo da requisição malformado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: "Token ausente ou inválido"
        "403":
          description: "Token válido, mas sem a role MECHANIC"
        "422":
          description: "Execução em estado que não permite registrar falha"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/supplies:
    get:
      tags:
        - Supply
      summary: "Lista as peças em estoque"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Lista de peças"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplyResponse"
        "401":
          description: "Token ausente ou inválido"
        "403":
          description: "Token válido, mas sem a role ADMIN"

    post:
      tags:
        - Supply
      summary: "Cadastra uma peça"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplyRequest"
      responses:
        "201":
          description: "Peça cadastrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyResponse"
        "400":
          description: "Corpo da requisição inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: "Token ausente ou inválido"
        "403":
          description: "Token válido, mas sem a role ADMIN"

  /v1/supplies/{id}:
    get:
      tags:
        - Supply
      summary: "Consulta uma peça"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Peça encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyResponse"
        "400":
          description: "`id` não é um UUID válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: "Token ausente ou inválido"
        "403":
          description: "Token válido, mas sem a role ADMIN"
        "422":
          description: "Peça não encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - Supply
      summary: "Atualiza uma peça"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplyRequest"
      responses:
        "200":
          description: "Peça atualizada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyResponse"
        "400":
          description: "`id` inválido ou corpo da requisição malformado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: "Token ausente ou inválido"
        "403":
          description: "Token válido, mas sem a role ADMIN"
        "422":
          description: "Peça não encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Supply
      summary: "Remove uma peça"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: "Peça removida"
        "400":
          description: "`id` não é um UUID válido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: "Token ausente ou inválido"
        "403":
          description: "Token válido, mas sem a role ADMIN"
        "422":
          description: "Peça não encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Autenticação via JWT Bearer Token.

        O token é emitido pelo Lambda Authorizer no API Gateway (repositório
        separado). O app decodifica as claims (`sub` → userId, `role`) sem
        re-validar a assinatura.

        **Formato do header:**
        `Authorization: Bearer <token>`

        Rotas de `/v1/executions` exigem a role `MECHANIC`; as de `/v1/supplies`
        exigem `ADMIN`.

  schemas:
    ExecutionStatus:
      type: string
      description: "Status da execução dentro da saga"
      enum:
        - RESERVED
        - QUEUED
        - IN_PROGRESS
        - DIAGNOSED
        - COMPLETED
        - FAILED
        - CANCELED

    ExecutionResponse:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
          description: "Ordem de serviço à qual a execução pertence"
        status:
          $ref: "#/components/schemas/ExecutionStatus"
        reservationId:
          type: [string, "null"]
          format: uuid
          description: "Reserva de peças associada, quando houver"
        paymentId:
          type: [string, "null"]
          description: "Identificador do pagamento confirmado, quando houver"
        createdAt:
          type: string
          description: "Data de criação"
        modifiedAt:
          type: string
          description: "Data da última modificação"
      required:
        - orderId
        - status
        - createdAt
        - modifiedAt

    CreateSupplyRequest:
      type: object
      properties:
        name:
          type: string
          examples:
            - "Pastilha de freio dianteira"
        description:
          type: [string, "null"]
          examples:
            - "Compatível com modelos 2015-2020"
        quantityInStock:
          type: integer
          examples:
            - 24
        price:
          type: number
          examples:
            - 189.90
      required:
        - name
        - quantityInStock
        - price

    SupplyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: [string, "null"]
        quantityInStock:
          type: integer
        price:
          type: number
      required:
        - id
        - name
        - quantityInStock
        - price

    ErrorResponse:
      type: object
      description: "Formato padrão de erro da aplicação"
      properties:
        code:
          type: string
          examples:
            - "EXECUTION_NOT_FOUND"
        message:
          type: string
          examples:
            - "Execution not found"
      required:
        - code
        - message

    ValidationError:
      type: object
      description: "Erro de validação de entrada, com detalhamento por campo"
      properties:
        code:
          type: string
          examples:
            - "BAD_REQUEST"
        fieldErrors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
            required:
              - field
              - message
      required:
        - code
        - fieldErrors
