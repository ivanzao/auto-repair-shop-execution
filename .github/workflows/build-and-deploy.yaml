name: Build & Deploy

on:
  push:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit Tests
        run: ./gradlew test
      - name: Integration Tests
        run: ./gradlew integrationTest

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build application JAR
        run: ./gradlew :main:shadowJar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'hml' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Read SSM params (cluster, dynamodb table, SNS topic, SQS queue, API GW)
        id: ssm
        run: |
          CLUSTER=$(aws ssm get-parameter --name /auto-repair-shop/${{ env.ENV }}/eks/cluster-name --query Parameter.Value --output text)
          TABLE=$(aws ssm get-parameter --name /auto-repair-shop/${{ env.ENV }}/execution/dynamodb/table-name --query Parameter.Value --output text)
          SNS_TOPIC=$(aws ssm get-parameter --name /auto-repair-shop/${{ env.ENV }}/sns/execution-events-topic-arn --query Parameter.Value --output text)
          SQS_URL=$(aws ssm get-parameter --name /auto-repair-shop/${{ env.ENV }}/sqs/execution-saga-queue-url --query Parameter.Value --output text)
          APIGW=$(aws ssm get-parameter --name /auto-repair-shop/${{ env.ENV }}/apigw/endpoint --query Parameter.Value --output text)
          {
            echo "cluster=$CLUSTER"
            echo "table=$TABLE"
            echo "sns_topic=$SNS_TOPIC"
            echo "sqs_url=$SQS_URL"
            echo "apigw_endpoint=$APIGW"
          } >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ steps.ssm.outputs.cluster }} --region ${{ env.AWS_REGION }}

      - name: Create K8s Secret for GHCR image pull
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace=auto-repair-shop-${{ env.ENV }} \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Rewrite ConfigMap overlay with runtime values
        working-directory: infra/k8s/overlays/${{ env.ENV }}
        run: |
          cat > configmap-patch.yaml <<EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: auto-repair-shop-execution-config
          data:
            APPLICATION_PROFILE: "${{ env.ENV }}"
            AWS_REGION: "${{ env.AWS_REGION }}"
            DYNAMODB_TABLE_NAME: "${{ steps.ssm.outputs.table }}"
            SNS_TOPIC_ARN: "${{ steps.ssm.outputs.sns_topic }}"
            SQS_QUEUE_URL: "${{ steps.ssm.outputs.sqs_url }}"
          EOF

      - name: Set image tag in overlay
        working-directory: infra/k8s/overlays/${{ env.ENV }}
        run: |
          kustomize edit set image ghcr.io/ivanzao/auto-repair-shop-execution=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      - name: Apply Kustomize overlay
        run: kubectl apply -k infra/k8s/overlays/${{ env.ENV }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/auto-repair-shop-execution -n auto-repair-shop-${{ env.ENV }} --timeout=300s

      - name: Smoke test /health (in-cluster via port-forward)
        run: |
          kubectl port-forward -n auto-repair-shop-${{ env.ENV }} svc/auto-repair-shop-execution-service 18080:8080 &
          PF_PID=$!
          sleep 5
          RESULT=1
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:18080/health" || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "Smoke test passed (status=200)"
              RESULT=0
              break
            fi
            echo "Attempt $i/10 - got status $CODE, retrying in 5s..."
            sleep 5
          done
          kill $PF_PID 2>/dev/null || true
          exit $RESULT
