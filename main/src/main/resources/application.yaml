application:
  url: "${APPLICATION_URL:http://localhost:8080}"
  profile: "${APPLICATION_PROFILE:dev}"

server:
  port: "${SERVER_PORT:8080}"

aws:
  region: "${AWS_REGION:us-east-1}"
  endpoint: "${AWS_ENDPOINT:}"
  accessKeyId: "${AWS_ACCESS_KEY_ID:}"
  secretAccessKey: "${AWS_SECRET_ACCESS_KEY:}"

dynamodb:
  table:
    name: "${DYNAMODB_TABLE_NAME:auto-repair-shop-execution-dev}"

sns:
  topic:
    # tópico de eventos do execution (produz SuppliesReserved etc.). Sempre setado por compose/k8s (SNS_TOPIC_ARN).
    arn: "${SNS_TOPIC_ARN}"

sqs:
  queue:
    # fila de entrada do execution. Sempre setado por compose/k8s (SQS_QUEUE_URL).
    url: "${SQS_QUEUE_URL}"

reservation:
  ttl:
    days: "${RESERVATION_TTL_DAYS:7}"
  job:
    interval:
      seconds: "${RESERVATION_JOB_INTERVAL_SECONDS:3600}"
