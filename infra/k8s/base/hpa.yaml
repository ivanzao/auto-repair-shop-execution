apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auto-repair-shop-execution
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auto-repair-shop-execution
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
